<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Disponibilités des studios LaScam</title>
</head>
<body>

<h1>Disponibilités des studios LaScam</h1>

<button onclick="loadData()">
🔄 Actualiser
</button>

<div id="content"></div>

<script>

async function loadData() {

  const response =
    await fetch(
      "disponibilites.json?t=" + Date.now()
    );

  const data =
    await response.json();

  document.getElementById(
    "content"
  ).innerHTML =
    JSON.stringify(data, null, 2);
}

loadData();

</script>

</body>
</html>
