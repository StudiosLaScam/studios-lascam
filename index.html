<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Créneaux disponibles — Studios LaScam</title>

  <style>
    :root {
      --bg: #f6f6f4;
      --text: #1f1f1f;

      --image: #2e8b57;
      --image-light: #eef8f1;

      --sound: #e67e22;
      --sound-light: #fff4ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 36px 18px;

      background:
        radial-gradient(circle at top left, rgba(46,139,87,0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(230,126,34,0.08), transparent 30%),
        var(--bg);

      font-family: Inter, Arial, Helvetica, sans-serif;

      color: var(--text);

      min-height: 100vh;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
    }

    .hero {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }

    .hero-title {
      font-size: 0.95rem;

      letter-spacing: 0.18em;
      text-transform: uppercase;

      color: #777;
      font-weight: 600;

      background: rgba(255,255,255,0.75);

      backdrop-filter: blur(12px);

      border: 1px solid rgba(255,255,255,0.5);

      border-radius: 999px;

      padding: 14px 24px;

      box-shadow:
        0 4px 20px rgba(0,0,0,0.04);
    }

    .grid {
      display: grid;

      grid-template-columns: repeat(2, minmax(0, 1fr));

      gap: 32px;

      align-items: start;
    }

    .card {
      background: rgba(255,255,255,0.82);

      backdrop-filter: blur(14px);

      border-radius: 28px;

      overflow: hidden;

      border: 1px solid rgba(255,255,255,0.8);

      box-shadow:
        0 10px 40px rgba(0,0,0,0.05),
        0 2px 8px rgba(0,0,0,0.03);

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-3px);

      box-shadow:
        0 14px 48px rgba(0,0,0,0.08),
        0 4px 12px rgba(0,0,0,0.04);
    }

    .card-header {
      padding: 22px 24px;
    }

    .card-image {
      background: var(--image-light);

      border-bottom:
        1px solid rgba(46,139,87,0.12);
    }

    .card-sound {
      background: var(--sound-light);

      border-bottom:
        1px solid rgba(230,126,34,0.12);
    }

    .label {
      display: inline-flex;

      align-items: center;
      gap: 8px;

      padding: 8px 14px;

      border-radius: 999px;

      font-size: 0.85rem;
      font-weight: 600;
    }

    .label-image {
      background: rgba(46,139,87,0.12);

      color: var(--image);
    }

    .label-sound {
      background: rgba(230,126,34,0.12);

      color: var(--sound);
    }

    iframe {
      width: 100%;
      height: 82vh;

      min-height: 780px;

      border: none;

      background: white;
    }

    @media (max-width: 1000px) {

      .grid {
        grid-template-columns: 1fr;
      }

      iframe {
        min-height: 680px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="hero">
      <div class="hero-title">
        Créneaux disponibles — Studios LaScam
      </div>
    </div>

    <div class="grid">

      <!-- STUDIO IMAGE -->
      <div class="card">

        <div class="card-header card-image">

          <div class="label label-image">
            ● Studio Image
          </div>

        </div>

        <iframe
          src="https://outlook.office365.com/owa/calendar/6714a0f86ead44b280f0f20fbec7c7e8@lascam.fr/f79c90a8ed194c32a17994039be42f251899749353559877707/calendar.html">
        </iframe>

      </div>

      <!-- STUDIO SON -->
      <div class="card">

        <div class="card-header card-sound">

          <div class="label label-sound">
            ● Studio Son
          </div>

        </div>

        <iframe
          src="https://outlook.office365.com/owa/calendar/6714a0f86ead44b280f0f20fbec7c7e8@lascam.fr/a706e01e72734e548f7b6c7280ff356415769568704837581163/calendar.html">
        </iframe>

      </div>

    </div>

  </div>

</body>
</html>
